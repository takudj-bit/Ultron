<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRON</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0f;--surface:#16161a;--surface2:#1e1e24;
  --border:#2a2a32;--text:#e0e0e6;--text-dim:#888894;
  --accent:#8b5cf6;--accent-glow:#8b5cf640;
  --green:#22c55e;--red:#ef4444;
  --sidebar-w:240px;
}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;
  background:var(--bg);color:var(--text);display:flex;overflow:hidden;
}

/* ===== Resize Handles ===== */
.resize-handle{
  width:5px;min-width:5px;cursor:col-resize;
  background:transparent;position:relative;z-index:10;flex-shrink:0;
}
.resize-handle::after{
  content:'';position:absolute;top:0;bottom:0;left:2px;width:1px;
  background:var(--border);transition:background .15s,width .15s,left .15s;
}
.resize-handle:hover::after,.resize-handle.active::after{
  background:var(--accent);width:3px;left:1px;
}
body.resizing{cursor:col-resize;user-select:none}
body.resizing *{pointer-events:none}
body.resizing .resize-handle{pointer-events:auto}

/* ===== History Sidebar ===== */
.sidebar{
  width:var(--sidebar-w);min-width:140px;max-width:450px;height:100%;
  background:var(--surface);flex-shrink:0;
  display:flex;flex-direction:column;
}
.sidebar-header{
  padding:14px 12px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-header h2{font-size:.75rem;color:var(--text-dim);font-weight:600;letter-spacing:.1em}
.new-btn{
  padding:4px 9px;font-size:.7rem;background:var(--accent);color:#fff;
  border:none;border-radius:4px;cursor:pointer;transition:.15s;
}
.new-btn:hover{filter:brightness(1.15)}
.history-list{flex:1;overflow-y:auto;padding:4px 0}
.history-list::-webkit-scrollbar{width:3px}
.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hi{padding:8px 12px;cursor:pointer;border-left:3px solid transparent;transition:.12s;position:relative}
.hi:hover{background:var(--surface2)}
.hi.active{background:var(--surface2);border-left-color:var(--accent)}
.hi .t{font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.hi .d{font-size:.65rem;color:var(--text-dim)}
.hi .x{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  display:none;background:none;border:none;color:var(--red);cursor:pointer;font-size:.8rem;padding:2px;
}
.hi:hover .x{display:block}
.history-empty{padding:20px 12px;text-align:center;color:var(--text-dim);font-size:.75rem}

/* ===== Center: Chat Column ===== */
.center{
  flex:1;min-width:280px;display:flex;flex-direction:column;height:100%;
}
.topbar{
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--surface);text-align:center;flex-shrink:0;
}
.topbar h1{font-size:1.1rem;font-weight:700;letter-spacing:.12em;color:var(--accent)}
.topbar span{font-size:.7rem;color:var(--text-dim)}

.chat{
  flex:1;overflow-y:auto;padding:16px 16px 8px;
  display:flex;flex-direction:column;gap:12px;
}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;padding:32px 16px;color:var(--text-dim);
}
.welcome h2{font-size:1.2rem;color:var(--accent);letter-spacing:.1em;margin-bottom:6px}
.welcome p{font-size:.82rem;line-height:1.6;max-width:360px}

/* messages */
.msg{max-width:100%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;max-width:85%}
.msg.ai{align-self:flex-start;max-width:95%}
.msg-label{font-size:.65rem;color:var(--text-dim);margin-bottom:3px;padding:0 2px}
.msg.user .msg-label{text-align:right}
.msg-body{
  padding:10px 14px;border-radius:10px;font-size:.84rem;line-height:1.6;
  word-wrap:break-word;white-space:pre-wrap;
}
.msg.user .msg-body{background:var(--accent);color:#fff;border-bottom-right-radius:2px}
.msg.ai .msg-body{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:2px}

/* collapsible */
.msg-section{margin-top:8px}
.msg-section:first-child{margin-top:0}
.section-toggle{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  font-size:.78rem;font-weight:600;color:var(--accent);padding:4px 0;user-select:none;
}
.section-toggle .arrow{transition:transform .2s;font-size:.65rem}
.section-toggle .arrow.open{transform:rotate(90deg)}
.section-content{display:none;padding:8px 0 2px;font-size:.84rem;line-height:1.6;white-space:pre-wrap}
.section-content.open{display:block}
.msg-actions{display:flex;gap:5px;margin-top:6px}
.msg-action{
  padding:2px 8px;font-size:.65rem;background:transparent;
  color:var(--text-dim);border:1px solid var(--border);border-radius:3px;
  cursor:pointer;transition:.12s;
}
.msg-action:hover{border-color:var(--accent);color:var(--accent)}
.msg-action.copied{border-color:var(--green);color:var(--green)}

/* thinking */
.thinking{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.thinking span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:blink 1.2s infinite}
.thinking span:nth-child(2){animation-delay:.2s}
.thinking span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.thinking-text{font-size:.75rem;color:var(--text-dim);margin-left:6px;align-self:center}

/* input bar */
.input-bar{
  flex-shrink:0;padding:10px 14px;
  border-top:1px solid var(--border);background:var(--surface);
}
.input-bar-inner{display:flex;gap:6px;align-items:flex-end}
.input-wrap{
  flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;transition:border-color .2s;
}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap.drag-over{border-color:var(--accent);background:var(--surface2)}
.chat-input{
  width:100%;padding:9px 12px;font-size:.85rem;
  background:transparent;color:var(--text);border:none;outline:none;
  font-family:inherit;resize:none;max-height:100px;line-height:1.4;
}
.chat-input::placeholder{color:var(--text-dim)}
.file-badge{display:none;padding:3px 10px 6px;font-size:.72rem;color:var(--text-dim);align-items:center;gap:5px}
.file-badge.show{display:flex}
.file-badge .fn{color:var(--green)}
.file-badge .rm{color:var(--red);cursor:pointer;font-weight:700}
.send-btn{
  padding:9px 14px;font-size:.82rem;font-weight:600;
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  cursor:pointer;transition:.15s;flex-shrink:0;
}
.send-btn:hover{filter:brightness(1.15)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
.input-hint{font-size:.65rem;color:var(--text-dim);margin-top:3px;padding:0 2px}

/* ===== Right Panel ===== */
.right-panel{
  width:420px;min-width:250px;max-width:700px;height:100%;
  display:flex;flex-direction:column;background:var(--bg);flex-shrink:0;
}
.rp-header{
  padding:0;background:var(--surface);flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.rp-tabs{display:flex}
.rp-tab{
  flex:1;padding:12px 14px;text-align:center;font-size:.8rem;font-weight:600;
  color:var(--text-dim);cursor:pointer;transition:.15s;
  border-bottom:2px solid transparent;letter-spacing:.04em;
}
.rp-tab:hover{color:var(--text);background:var(--surface2)}
.rp-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rp-actions{
  display:flex;justify-content:space-between;align-items:center;padding:6px 14px;
  border-bottom:1px solid var(--border);background:var(--surface);gap:8px;
}
.version-select{
  padding:3px 8px;font-size:.72rem;
  background:var(--bg);color:var(--text);
  border:1px solid var(--border);border-radius:4px;
  outline:none;cursor:pointer;font-family:inherit;
}
.version-select:focus{border-color:var(--accent)}
.version-select option{background:var(--surface);color:var(--text)}
.version-info{font-size:.65rem;color:var(--text-dim);flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lp-btn{
  padding:4px 10px;font-size:.7rem;background:transparent;
  color:var(--text-dim);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;transition:.12s;
}
.lp-btn:hover{border-color:var(--accent);color:var(--accent)}
.lp-btn.copied{border-color:var(--green);color:var(--green)}

.rp-body{flex:1;overflow-y:auto;padding:20px;position:relative}
.rp-body::-webkit-scrollbar{width:4px}
.rp-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.rp-content{display:none;font-size:.9rem;line-height:1.9;white-space:pre-wrap;word-wrap:break-word;color:var(--text)}
.rp-content.active{display:block}

.rp-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;color:var(--text-dim);
}
.rp-empty .icon{font-size:2.5rem;margin-bottom:10px;opacity:.4}
.rp-empty p{font-size:.82rem;line-height:1.5}

/* version badge (legacy, kept for compat) */
.version-badge{display:none}

/* lyrics update flash */
@keyframes lyricsFlash{
  0%{background:rgba(139,92,246,.08)}100%{background:transparent}
}
.lyrics-flash{animation:lyricsFlash .8s ease}

/* mobile */
.sidebar-toggle{
  display:none;position:fixed;top:8px;left:8px;z-index:200;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.95rem;
}
.lyrics-toggle{
  display:none;position:fixed;top:8px;right:8px;z-index:200;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.95rem;
}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
@media(max-width:1024px){
  .right-panel{
    position:fixed;right:-420px;top:0;z-index:99;transition:right .25s;height:100%;
    border-left:1px solid var(--border);
  }
  .right-panel.open{right:0}
  .lyrics-toggle{display:block}
}
@media(max-width:768px){
  .sidebar{position:fixed;left:calc(-1*var(--sidebar-w));top:0;z-index:99;transition:left .25s;height:100%}
  .sidebar.open{left:0}
  .sidebar-toggle{display:block}
  .sidebar-overlay.show{display:block}
}
</style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>
<button class="lyrics-toggle" id="lyricsToggle">&#9835;</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- History Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>HISTORY</h2>
    <div style="display:flex;gap:4px">
      <button class="new-btn" id="regenTitles" title="タイトル再生成" style="background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)">&#x21bb;</button>
      <button class="new-btn" id="newBtn">+ NEW</button>
    </div>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="historyEmpty">履歴なし</div>
  </div>
</aside>

<!-- Resize handle: sidebar | chat -->
<div class="resize-handle" id="resizeLeft"></div>

<!-- Center: Chat -->
<div class="center">
  <div class="topbar">
    <h1>ULTRON</h1>
    <span>トレンドリサーチ &times; AI作詞</span>
  </div>
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <h2>ULTRON</h2>
      <p>企画書を入力またはPDF/TXTをドロップ。<br>トレンドリサーチ＋歌詞ドラフトを生成します。<br><br>生成後はフィードバックを送って修正を重ねられます。</p>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-bar-inner">
      <div class="input-wrap" id="inputWrap">
        <textarea class="chat-input" id="chatInput" rows="1"
          placeholder="企画内容を入力、またはファイルをドロップ..."></textarea>
        <div class="file-badge" id="fileBadge">
          <span class="fn" id="fileName"></span>
          <span class="rm" id="fileRemove">&times;</span>
        </div>
      </div>
      <button class="send-btn" id="sendBtn">送信</button>
    </div>
    <div class="input-hint">Enter 送信 / Shift+Enter 改行 / PDF・TXT ドロップ対応</div>
    <input type="file" id="fileInput" accept=".pdf,.txt,.text" style="display:none">
  </div>
</div>

<!-- Resize handle: chat | lyrics -->
<div class="resize-handle" id="resizeRight"></div>

<!-- Right Panel -->
<div class="right-panel" id="lyricsPanel">
  <div class="rp-header">
    <div class="rp-tabs">
      <div class="rp-tab active" data-tab="lyrics">&#9835; 歌詞</div>
      <div class="rp-tab" data-tab="research">&#128270; リサーチ</div>
    </div>
  </div>
  <div class="rp-actions">
    <select class="version-select" id="versionSelect" title="バージョン切り替え">
      <option value="v1">v1 - 初回生成</option>
    </select>
    <span class="version-info" id="versionInfo"></span>
    <button class="lp-btn" id="lpCopy">コピー</button>
  </div>
  <div class="rp-body">
    <div class="rp-empty" id="rpEmpty">
      <div class="icon">&#9835;</div>
      <p>歌詞・リサーチがここに表示されます<br>チャットで企画書を送信してください</p>
    </div>
    <!-- Lyrics tab -->
    <div class="rp-content" id="rpLyrics" data-tab="lyrics">
      <div class="version-badge" id="versionBadge">v1 - 初回生成</div>
      <div id="lyricsDisplay"></div>
    </div>
    <!-- Research tab -->
    <div class="rp-content" id="rpResearch" data-tab="research">
      <div style="margin-bottom:16px">
        <div style="font-size:.8rem;font-weight:600;color:var(--accent);margin-bottom:8px;letter-spacing:.04em">&#127919; 歌詞制作ポイント（要約）</div>
        <div id="distilledDisplay"></div>
      </div>
      <div style="border-top:1px solid var(--border);padding-top:16px">
        <div style="font-size:.8rem;font-weight:600;color:var(--text-dim);margin-bottom:8px;letter-spacing:.04em">&#128270; Raw リサーチ</div>
        <div id="researchDisplay" style="color:var(--text-dim)"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const chat = $('chat'), welcome = $('welcome');
const chatInput = $('chatInput'), inputWrap = $('inputWrap'), sendBtn = $('sendBtn');
const fileBadge = $('fileBadge'), fileNameEl = $('fileName'), fileRemove = $('fileRemove');
const historyList = $('historyList'), historyEmpty = $('historyEmpty');
const sidebar = $('sidebar'), lyricsPanel = $('lyricsPanel');
const lyricsDisplay = $('lyricsDisplay'), rpEmpty = $('rpEmpty');
const rpLyrics = $('rpLyrics'), rpResearch = $('rpResearch');
const versionBadge = $('versionBadge');
const distilledDisplay = $('distilledDisplay'), researchDisplay = $('researchDisplay');
const versionSelect = $('versionSelect'), versionInfo = $('versionInfo');
let activeTab = 'lyrics';

let selectedFile = null, activeId = null, currentLyrics = '', isGenerating = false;
let lyricsVersion = 0;
let versions = []; // [{label, lyrics, parent, feedback}]
let selectedVersion = 'v1';

// --- Right panel tabs ---
document.querySelectorAll('.rp-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    activeTab = tab.dataset.tab;
    document.querySelectorAll('.rp-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===activeTab));
    document.querySelectorAll('.rp-content').forEach(c => c.classList.toggle('active', c.dataset.tab===activeTab));
  });
});

function showRpTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.rp-tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.rp-content').forEach(c => c.classList.toggle('active', c.dataset.tab===tab));
}

let currentResearch = '', currentDistilled = '';

// --- Version management ---
function renderVersionSelect() {
  versionSelect.innerHTML = '';
  versions.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.label;
    const isBranch = v.label.includes('-');
    const suffix = v.parent ? ` (from ${v.parent})` : ' - 初回生成';
    opt.textContent = v.label + suffix;
    versionSelect.appendChild(opt);
  });
  versionSelect.value = selectedVersion;
  updateVersionInfo();
}

function updateVersionInfo() {
  const v = versions.find(x => x.label === selectedVersion);
  if (v && v.feedback) {
    versionInfo.textContent = '💬 ' + v.feedback.slice(0, 40) + (v.feedback.length > 40 ? '...' : '');
  } else {
    versionInfo.textContent = '';
  }
}

versionSelect.addEventListener('change', () => {
  selectedVersion = versionSelect.value;
  const v = versions.find(x => x.label === selectedVersion);
  if (v) {
    currentLyrics = v.lyrics;
    lyricsDisplay.textContent = v.lyrics;
    lyricsDisplay.classList.remove('lyrics-flash');
    void lyricsDisplay.offsetWidth;
    lyricsDisplay.classList.add('lyrics-flash');
    updateVersionInfo();
    showRpTab('lyrics');
  }
});

function addVersion(label, lyrics, parent, feedback) {
  versions.push({ label, lyrics, parent: parent||null, feedback: feedback||null });
  selectedVersion = label;
  renderVersionSelect();
}

function setVersions(vers) {
  versions = vers || [];
  if (versions.length) selectedVersion = versions[versions.length-1].label;
  else selectedVersion = 'v1';
  renderVersionSelect();
}

function updateLyricsPanel(lyrics, label) {
  lyricsVersion++;
  currentLyrics = lyrics;
  lyricsDisplay.textContent = lyrics;
  rpEmpty.style.display = 'none';
  showRpTab('lyrics');
  lyricsDisplay.classList.remove('lyrics-flash');
  void lyricsDisplay.offsetWidth;
  lyricsDisplay.classList.add('lyrics-flash');
}

function updateResearchPanel(research, distilled) {
  currentResearch = research || '';
  currentDistilled = distilled || '';
  researchDisplay.textContent = currentResearch;
  distilledDisplay.textContent = currentDistilled;
}

function clearRightPanel() {
  lyricsVersion = 0; currentLyrics = ''; currentResearch = ''; currentDistilled = '';
  versions = []; selectedVersion = 'v1';
  rpEmpty.style.display = 'flex';
  rpLyrics.classList.remove('active');
  rpResearch.classList.remove('active');
  lyricsDisplay.textContent = '';
  researchDisplay.textContent = '';
  distilledDisplay.textContent = '';
  versionSelect.innerHTML = '<option value="v1">v1 - 初回生成</option>';
  versionInfo.textContent = '';
  showRpTab('lyrics');
}

$('lpCopy').addEventListener('click', function() {
  let text = '';
  if (activeTab==='lyrics') text = currentLyrics;
  else text = currentDistilled + '\n\n---\n\n' + currentResearch;
  if (!text.trim()) return;
  navigator.clipboard.writeText(text).then(() => {
    this.textContent = 'コピー済み'; this.classList.add('copied');
    setTimeout(() => { this.textContent = 'コピー'; this.classList.remove('copied'); }, 1500);
  });
});

// --- Auto-resize ---
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
});

// --- Drag & drop ---
inputWrap.addEventListener('dragover', e => { e.preventDefault(); inputWrap.classList.add('drag-over'); });
inputWrap.addEventListener('dragleave', () => inputWrap.classList.remove('drag-over'));
inputWrap.addEventListener('drop', e => {
  e.preventDefault(); inputWrap.classList.remove('drag-over');
  if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
});
function setFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['pdf','txt','text'].includes(ext)) return;
  selectedFile = file; fileNameEl.textContent = file.name; fileBadge.classList.add('show');
  if (ext==='txt'||ext==='text') {
    const r = new FileReader();
    r.onload = ev => { chatInput.value = ev.target.result; chatInput.dispatchEvent(new Event('input')); };
    r.readAsText(file);
  }
}
function clearFile() { selectedFile = null; fileBadge.classList.remove('show'); fileNameEl.textContent = ''; }
fileRemove.addEventListener('click', clearFile);

// --- Send ---
chatInput.addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()} });
sendBtn.addEventListener('click', send);

async function send() {
  if (isGenerating) return;
  const text = chatInput.value.trim();
  const hasPdf = selectedFile && selectedFile.name.toLowerCase().endsWith('.pdf');
  if (!text && !hasPdf) return;

  welcome.style.display = 'none';
  const userText = hasPdf && !text ? '📄 '+selectedFile.name : text;
  addMsg('user', userText);
  chatInput.value = ''; chatInput.style.height = 'auto';
  isGenerating = true; sendBtn.disabled = true;

  if (!activeId) {
    // generate
    const thinkEl = addThinking('トレンドリサーチ中...');
    const fd = new FormData();
    if (hasPdf) fd.append('file', selectedFile); else fd.append('text', text);
    clearFile();
    try {
      const timer = setTimeout(() => {
        const t = thinkEl.querySelector('.thinking-text'); if(t) t.textContent='歌詞ドラフト生成中...';
      }, 8000);
      const res = await fetch('/api/generate',{method:'POST',body:fd});
      const data = await res.json(); clearTimeout(timer); thinkEl.remove();
      if (!res.ok) { addMsg('ai','エラー: '+(data.error||'生成に失敗')); return; }
      activeId = data.id;
      lyricsVersion = 0;
      addAiResult(data.research, data.distilled, data.lyrics);
      updateResearchPanel(data.research, data.distilled);
      versions = [];
      lyricsVersion = 0;
      addVersion('v1', data.lyrics, null, null);
      updateLyricsPanel(data.lyrics);
      loadHistory();
    } catch(e) { thinkEl.remove(); addMsg('ai','通信エラー: '+e.message); }
  } else {
    // revise
    clearFile();
    const fromVer = selectedVersion;
    const thinkEl = addThinking('歌詞を修正中... (from ' + fromVer + ')');
    try {
      const res = await fetch('/api/revise',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({entry_id:activeId, current_lyrics:currentLyrics, feedback:text, from_version:fromVer}),
      });
      const data = await res.json(); thinkEl.remove();
      if (!res.ok) { addMsg('ai','エラー: '+(data.error||'修正に失敗')); return; }
      const newLabel = data.version_label || ('v'+(versions.length+1));
      addVersion(newLabel, data.lyrics, fromVer, text);
      addAiRevision(data.lyrics, newLabel, fromVer);
      updateLyricsPanel(data.lyrics);
    } catch(e) { thinkEl.remove(); addMsg('ai','通信エラー: '+e.message); }
  }
  isGenerating = false; sendBtn.disabled = false;
}

// --- Messages ---
function addMsg(role, text) {
  const el = document.createElement('div');
  el.className = 'msg '+role;
  el.innerHTML = '<div class="msg-label">'+(role==='user'?'You':'ULTRON')+'</div><div class="msg-body"></div>';
  el.querySelector('.msg-body').textContent = text;
  chat.appendChild(el); scrollBottom();
}

function addAiResult(research, distilled, lyrics) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.innerHTML = `
    <div class="msg-label">ULTRON</div>
    <div class="msg-body">
      <div class="msg-section">
        <div class="section-toggle" onclick="toggleSection(this)">
          <span class="arrow">&#9654;</span> 🔍 トレンドリサーチ（raw）
        </div>
        <div class="section-content research-c"></div>
      </div>
      <div class="msg-section" style="margin-top:8px">
        <div class="section-toggle" onclick="toggleSection(this)">
          <span class="arrow open">&#9654;</span> 🎯 歌詞制作ポイント（要約）
        </div>
        <div class="section-content open distilled-c"></div>
      </div>
      <div class="msg-section" style="margin-top:8px">
        <div style="font-size:.78rem;font-weight:600;color:var(--accent);padding:4px 0">🎵 歌詞ドラフト → 右パネルに表示中</div>
      </div>
      <div class="msg-actions">
        <button class="msg-action" onclick="copyFrom(this,'d')">要約をコピー</button>
        <button class="msg-action" onclick="copyFrom(this,'r')">rawリサーチをコピー</button>
      </div>
    </div>`;
  el.querySelector('.research-c').textContent = research;
  el.querySelector('.distilled-c').textContent = distilled || '';
  el._research = research;
  el._distilled = distilled || '';
  chat.appendChild(el); scrollBottom();
}

function addAiRevision(lyrics, label, fromVer) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  const vLabel = label || ('v'+lyricsVersion);
  const fromInfo = fromVer ? ` (${fromVer} → ${vLabel})` : '';
  const isBranch = vLabel.includes('-');
  const branchNote = isBranch ? ' 🔀 分岐' : '';
  el.innerHTML = `
    <div class="msg-label">ULTRON</div>
    <div class="msg-body">
      <div style="font-size:.78rem;font-weight:600;color:var(--accent);padding:4px 0">
        🎵 ${vLabel}${branchNote}${fromInfo} → 右パネルに反映済み
      </div>
      <div class="msg-section">
        <div class="section-toggle" onclick="toggleSection(this)">
          <span class="arrow">&#9654;</span> 修正内容を表示
        </div>
        <div class="section-content rev-c"></div>
      </div>
    </div>`;
  el.querySelector('.rev-c').textContent = lyrics;
  chat.appendChild(el); scrollBottom();
}

function addThinking(text) {
  const el = document.createElement('div');
  el.className = 'thinking';
  el.innerHTML = '<span></span><span></span><span></span><span class="thinking-text">'+text+'</span>';
  chat.appendChild(el); scrollBottom(); return el;
}

function toggleSection(t) {
  t.querySelector('.arrow').classList.toggle('open');
  t.nextElementSibling.classList.toggle('open');
}

function copyFrom(btn, type) {
  const msg = btn.closest('.msg');
  let t = '', label = '';
  if (type==='r') { t = msg._research||msg.querySelector('.research-c')?.textContent||''; label='rawリサーチをコピー'; }
  else if (type==='d') { t = msg._distilled||msg.querySelector('.distilled-c')?.textContent||''; label='要約をコピー'; }
  navigator.clipboard.writeText(t).then(() => {
    btn.textContent='コピー済み'; btn.classList.add('copied');
    setTimeout(()=>{btn.textContent=label;btn.classList.remove('copied')},1500);
  });
}

function scrollBottom() { requestAnimationFrame(()=>{ chat.scrollTop=chat.scrollHeight }); }

// --- Mobile toggles ---
$('sidebarToggle').addEventListener('click', () => { sidebar.classList.toggle('open'); $('sidebarOverlay').classList.toggle('show'); });
$('lyricsToggle').addEventListener('click', () => { lyricsPanel.classList.toggle('open'); });
$('sidebarOverlay').addEventListener('click', () => { sidebar.classList.remove('open'); $('sidebarOverlay').classList.remove('show'); });

// --- Sidebar ---
$('regenTitles').addEventListener('click', async function() {
  this.disabled = true; this.textContent = '...';
  try {
    const res = await fetch('/api/history/regenerate-titles', {method:'POST'});
    const data = await res.json();
    loadHistory();
  } catch(e) {}
  this.disabled = false; this.textContent = '\u21bb';
});

$('newBtn').addEventListener('click', () => {
  activeId=null; clearRightPanel();
  chat.innerHTML=''; chat.appendChild(welcome); welcome.style.display='flex';
  document.querySelectorAll('.hi').forEach(el=>el.classList.remove('active'));
  sidebar.classList.remove('open'); $('sidebarOverlay').classList.remove('show');
});

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    const items = await res.json();
    historyList.querySelectorAll('.hi').forEach(el=>el.remove());
    historyEmpty.style.display = items.length?'none':'block';
    items.forEach(item => {
      const el = document.createElement('div');
      el.className='hi'+(item.id===activeId?' active':'');
      el.dataset.id=item.id;
      const d=new Date(item.created_at);
      const ds=(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      el.innerHTML='<div class="t">'+esc(item.title)+'</div><div class="d">'+ds+'</div><button class="x">&times;</button>';
      el.addEventListener('click',e=>{if(!e.target.classList.contains('x'))selectHistory(item.id)});
      el.querySelector('.x').addEventListener('click',e=>{e.stopPropagation();deleteHistory(item.id)});
      historyList.appendChild(el);
    });
  } catch(e){}
}

async function selectHistory(id) {
  try {
    const res=await fetch('/api/history/'+id);
    const data=await res.json();
    if(!res.ok) return;
    activeId=id; lyricsVersion=0;
    chat.innerHTML=''; welcome.style.display='none'; chat.appendChild(welcome);

    addMsg('user', data.brief||'');
    addAiResult(data.research||'', data.distilled||'', data.lyrics||'');
    updateResearchPanel(data.research||'', data.distilled||'');

    // Restore versions
    if (data.versions && data.versions.length) {
      setVersions(data.versions);
    } else {
      // legacy: build from revisions
      versions = [{label:'v1', lyrics:data.lyrics||'', parent:null, feedback:null}];
      if (data.revisions) {
        data.revisions.forEach((rev,i) => {
          versions.push({label:'v'+(i+2), lyrics:rev.previous_lyrics||'', parent:'v'+(i+1), feedback:rev.feedback});
        });
      }
      setVersions(versions);
    }

    // replay revisions in chat
    if (data.versions && data.versions.length > 1) {
      data.versions.slice(1).forEach(v => {
        if (v.feedback) addMsg('user', v.feedback);
        const el = document.createElement('div');
        el.className='msg ai';
        const isBranch = v.label.includes('-');
        el.innerHTML=`<div class="msg-label">ULTRON</div>
          <div class="msg-body"><div style="font-size:.78rem;font-weight:600;color:var(--accent);padding:4px 0">🎵 ${v.label}${isBranch?' 🔀 分岐':''} (from ${v.parent||'?'})</div></div>`;
        chat.appendChild(el);
      });
    } else if (data.revisions && data.revisions.length) {
      data.revisions.forEach((rev,i) => {
        addMsg('user', rev.feedback);
        const el = document.createElement('div');
        el.className='msg ai';
        el.innerHTML=`<div class="msg-label">ULTRON</div>
          <div class="msg-body"><div style="font-size:.78rem;font-weight:600;color:var(--accent);padding:4px 0">🎵 v${i+2}</div></div>`;
        chat.appendChild(el);
      });
    }

    lyricsVersion = versions.length;
    updateLyricsPanel(currentLyrics);

    document.querySelectorAll('.hi').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
    sidebar.classList.remove('open'); $('sidebarOverlay').classList.remove('show');
    scrollBottom();
  } catch(e){}
}

async function deleteHistory(id) {
  try {
    await fetch('/api/history/'+id,{method:'DELETE'});
    if(activeId===id){ activeId=null; clearRightPanel(); chat.innerHTML=''; chat.appendChild(welcome); welcome.style.display='flex'; }
    loadHistory();
  } catch(e){}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

loadHistory();

// --- Resize handles ---
(function(){
  const resizeLeft = $('resizeLeft');
  const resizeRight = $('resizeRight');

  function initResize(handle, getTarget, side) {
    let startX, startW, target;
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      target = getTarget();
      startX = e.clientX;
      startW = target.getBoundingClientRect().width;
      handle.classList.add('active');
      document.body.classList.add('resizing');
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    const minW = side === 'left' ? 140 : 250;
    const maxW = side === 'left' ? 450 : 700;
    function onMove(e) {
      const dx = e.clientX - startX;
      const newW = side === 'left' ? startW + dx : startW - dx;
      const clamped = Math.max(minW, Math.min(maxW, newW));
      target.style.flex = 'none';
      target.style.width = clamped + 'px';
      target.style.minWidth = clamped + 'px';
      target.style.maxWidth = clamped + 'px';
    }
    function onUp() {
      handle.classList.remove('active');
      document.body.classList.remove('resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
  }

  initResize(resizeLeft, () => sidebar, 'left');
  initResize(resizeRight, () => lyricsPanel, 'right');
})();
</script>
