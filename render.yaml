databases:
  - name: ultron-db
    plan: free
    databaseName: ultron
    user: ultron

services:
  - type: web
    name: ultron
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ultron-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
